name: Send WeCom procurement digests

on:
  workflow_dispatch:
    inputs:
      period:
        description: Digest window to send
        required: true
        type: choice
        options:
          - noon
          - evening
      latest_test:
        description: Send the latest real records as a display test
        required: true
        default: false
        type: boolean
permissions:
  contents: read

env:
  PYTHONUNBUFFERED: "1"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out crawler code
        uses: actions/checkout@v4

      - name: Restore latest crawl data
        shell: bash
        run: |
          git fetch origin data:data
          git archive data data | tar -x
          test -f data/bidscout.sqlite3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install -e .

      - name: Send digest
        env:
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          INPUT_PERIOD: ${{ inputs.period }}
          INPUT_LATEST_TEST: ${{ inputs.latest_test }}
          REPORT_URL: https://bidscout.futurescience.technology/
        shell: bash
        run: |
          test_args=()
          period="$INPUT_PERIOD"
          if [[ "$INPUT_LATEST_TEST" == "true" ]]; then
            test_args+=(--latest-test)
          fi
          python -m bidscout_crawler.notify --period "$period" --data-dir data --report-url "$REPORT_URL" --skip-empty "${test_args[@]}"
