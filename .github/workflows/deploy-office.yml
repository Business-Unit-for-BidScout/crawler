name: Deploy crawler to bid-office-01

on:
  push:
    branches:
      - main
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bid-office-01-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Publish tested release
    runs-on:
      - self-hosted
      - Linux
      - X64
      - bid-office-01
      - bidscout-deploy
    timeout-minutes: 45
    steps:
      - name: Check out crawler main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 1
          clean: true
          persist-credentials: false

      - name: Check out requirements main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: Business-Unit-for-BidScout/requirements
          ref: main
          path: requirements
          token: ${{ secrets.REQUIREMENTS_TOKEN }}
          fetch-depth: 1
          clean: true
          persist-credentials: false

      - name: Seal release metadata
        shell: bash
        env:
          RELEASE_EVENT_NAME: ${{ github.event_name }}
          RELEASE_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          git remote set-url origin "https://github.com/Business-Unit-for-BidScout/crawler"
          git -C requirements remote set-url origin "https://github.com/Business-Unit-for-BidScout/requirements"
          git config --local --unset-all http.https://github.com/.extraheader || true
          git -C requirements config --local --unset-all http.https://github.com/.extraheader || true
          {
            printf 'schema=1\n'
            printf 'crawler_sha=%s\n' "$(git rev-parse HEAD)"
            printf 'requirements_sha=%s\n' "$(git -C requirements rev-parse HEAD)"
            printf 'event_name=%s\n' "$RELEASE_EVENT_NAME"
            printf 'run_id=%s\n' "$RELEASE_RUN_ID"
          } > .bidscout-release-metadata

      - name: Invoke constrained release broker
        shell: bash
        run: sudo --non-interactive /usr/local/sbin/bidscout-release
