name: Publish BidScout report to Pages

on:
  workflow_run:
    workflows:
      - Crawl and classify notices
    types:
      - completed
  workflow_dispatch:
    inputs:
      run_id:
        description: Optional successful crawl run ID to publish; defaults to the latest successful crawl artifact
        required: false
        type: string

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out report generator
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install report generator
        run: python -m pip install -e .

      - name: Resolve crawl run
        id: resolve
        uses: actions/github-script@v7
        env:
          INPUT_RUN_ID: ${{ inputs.run_id }}
          EVENT_RUN_ID: ${{ github.event.workflow_run.id }}
        with:
          script: |
            const requested = process.env.INPUT_RUN_ID || process.env.EVENT_RUN_ID;
            let run;
            if (requested) {
              run = await github.rest.actions.getWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: Number(requested),
              }).then(response => response.data);
            } else {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'crawl.yml',
                status: 'success',
                per_page: 20,
              }).then(response => response.data.workflow_runs);
              run = runs.find(item => item.event === 'workflow_dispatch') || runs[0];
            }
            if (!run || run.conclusion !== 'success') {
              core.setFailed('A successful crawl run is required.');
              return;
            }
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id,
              per_page: 100,
            }).then(response => response.data.artifacts);
            const artifact = artifacts.find(item => item.name === `bidscout-crawl-${run.id}` && !item.expired);
            if (!artifact) {
              core.setFailed(`No live crawl artifact found for run ${run.id}.`);
              return;
            }
            core.setOutput('run_id', String(run.id));
            core.setOutput('artifact_id', String(artifact.id));

      - name: Download crawl artifact
        uses: actions/download-artifact@v4
        with:
          name: bidscout-crawl-${{ steps.resolve.outputs.run_id }}
          path: crawl-data
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.resolve.outputs.run_id }}

      - name: Validate report data
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          candidates = list(Path("crawl-data").rglob("documents.jsonl"))
          if not candidates:
              raise SystemExit("No documents.jsonl found in crawl artifact")
          count = sum(1 for line in candidates[0].open(encoding="utf-8") if line.strip())
          print(f"documents={count}")
          if count == 0:
              raise SystemExit("No documents available; keeping the currently published Pages report")
          PY

      - name: Build static report
        run: >-
          python -m bidscout_crawler.report
          --input crawl-data
          --output site
          --run-id "${{ steps.resolve.outputs.run_id }}"

      - name: Set custom domain
        run: cp CNAME site/CNAME

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
